<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking | FCP Sunrise</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header"><nav class="navbar container"><a href="index.html" class="brand"><img class="brand-logo-img" src="logo.jpg" alt="FCP Sunrise logo" /><span><strong>FCP Sunrise</strong><small>Travel & Tours Inc.</small></span></a><button class="menu-toggle" aria-label="Toggle Menu">☰</button><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="destinations.html">Destinations</a></li><li><a href="services.html">Services</a></li><li><a class="active" href="booking.html">Booking</a></li><li><a href="contact.html">Contact</a></li></ul></nav></header>
<header class="site-header"><nav class="navbar container"><a href="index.html" class="brand"><img class="logo" src="logo.jpg" alt="FCP Sunrise Travel & Tours Logo" /><span><strong>FCP Sunrise</strong><small>Travel & Tours Inc.</small></span></a><button class="menu-toggle" aria-label="Toggle Menu">☰</button><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="destinations.html">Destinations</a></li><li><a href="services.html">Services</a></li><li><a class="active" href="booking.html">Booking</a></li><li><a href="contact.html">Contact</a></li></ul></nav></header>
<main class="subpage-main">
  <section class="sub-hero container"><h1>Book Your Travel Plan</h1><p>Submit your booking request and our consultants will contact you right away.</p></section>
  <section class="container">
    <form class="glass-form formsubmit-form" id="bookingForm" action="https://formsubmit.co/FCPSUNRISE@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_next" value="thankyou.html" />
      <input type="hidden" name="_subject" value="New Travel Inquiry - FCP Sunrise Website" />
      <div><label>Full Name</label><input type="text" name="name" required /></div>
      <div><label>Email Address</label><input type="email" name="email" required /></div>
      <div><label>Phone Number</label><input type="tel" name="phone" required /></div>
      <div><label>Destination</label><input type="text" name="destination" required placeholder="Japan" /></div>
      <div><label>Travel Date</label><input type="date" name="travel_date" required /></div>
      <div><label>Number of Travelers</label><input type="number" name="travelers" min="1" value="1" required /></div>
      <div class="full"><label>Message / Inquiry</label><textarea name="message" rows="5" required placeholder="Tell us your preferred package, hotel, or flight details."></textarea></div>
      <button class="btn btn-primary" type="submit">Book Now</button>
      <p class="full form-status" aria-live="polite"></p>
    </form>
  </section>
</main>
<script src="js/script.js"></script>
</body>
</html>
