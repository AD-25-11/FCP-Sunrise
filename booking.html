<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Booking | FCP Sunrise</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header"><nav class="navbar container"><a href="index.html" class="brand"><span class="brand-logo">☀</span><span><strong>FCP Sunrise</strong><small>Travel & Tours Inc.</small></span></a><button class="menu-toggle">☰</button><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="destinations.html">Destinations</a></li><li><a href="services.html">Services</a></li><li><a class="active" href="booking.html">Booking</a></li><li><a href="contact.html">Contact</a></li></ul></nav></header>
<main class="subpage-main">
  <section class="sub-hero container"><h1>Airline Booking Interface</h1><p>Search demo flights and connect with our consultants to finalize your itinerary.</p></section>
  <section class="container">
    <form class="glass-form" id="flightSearchForm">
      <div><label>From</label><input type="text" name="from" required placeholder="Manila" /></div>
      <div><label>To</label><input type="text" name="to" required placeholder="Tokyo" /></div>
      <div><label>Departure Date</label><input type="date" name="departure" required /></div>
      <div><label>Return Date</label><input type="date" name="return" /></div>
      <div><label>Passengers</label><input type="number" name="passengers" min="1" max="10" value="1" required /></div>
      <button class="btn btn-primary" type="submit">Search Flights</button>
    </form>
    <div id="flightResults" class="results-table"></div>
  </section>
</main>
<script src="js/script.js"></script>
</body>
</html>
